<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chroma-js/2.4.2/chroma.min.js"></script>
</head>

<body>
    <div id="app">
        <div v-for="(color, index) in colors" :key="index" :style="{ backgroundColor: color.hex }" class="color-box">
            <div class="content" :style="{ color: getTextColor(color.hex) }">
                <span class="hex">{{ color.hex.toUpperCase() }}</span>
                <button @click="color.isLocked = !color.isLocked">
                    <i class="material-icons">
                        {{ color.isLocked ? 'lock' : 'lock_open' }}
                    </i>
                </button>
            </div>
        </div>
        <button @click="refreshColors" id="fresh">Refresh Colors</button>
    </div>

    <script>
        const { createApp, ref, watch } = Vue;
        createApp({
            setup() {
                const colors = ref([
                    { hex: '#FF5733', isLocked: false },
                    { hex: '#33FF57', isLocked: false },
                    { hex: '#3357FF', isLocked: false },
                    { hex: '#F1C40F', isLocked: false },
                    { hex: '#8E44AD', isLocked: false }
                ])

                function getRandomHex() {
                    return chroma.random().hex();
                }

                function refreshColors() {
                    const lockedColors = colors.value.filter(c => c.isLocked);
                    let scale;

                    if (lockedColors.length === 0) {
                        let randomFlag = Math.random();
                        if(randomFlag <= 0.5)
                        {
                            const base = chroma.random();
                            const complement = base.set('hsl.h', (base.get('hsl.h') + 180) % 360);
                            scale = chroma.scale([base, complement]).mode('lch');
                        }
                        else
                        {
                            const color1 = chroma.random();
                            const color2 = chroma.random();
                            while (chroma.distance(color1, color2) < 60) {
                                color2 = chroma.random();
                            }
                            scale = chroma.scale([color1, color2]).mode('lch');
                        }

                        colors.value = colors.value.map((c, i) => ({
                            ...c,
                            hex: scale(i / (colors.value.length - 1)).hex()
                        }))
                        return
                    }

                    const baseColor = lockedColors[0].hex
                    const [h, s, l] = chroma(baseColor).hsl()

                    for (let i = 0; i < colors.value.length; i++) {
                        if (!colors.value[i].isLocked) {
                            const newHue = (h + (Math.random() * 40 - 40) + 360) % 360
                            const newS = Math.min(1, Math.max(0, s + (Math.random() * 0.2 - 0.1)))
                            const newL = Math.min(1, Math.max(0, l + (Math.random() * 0.2 - 0.1)))
                            colors.value[i].hex = chroma.hsl(newHue, newS, newL).hex()
                        }
                    }
                }

                function getTextColor(hex) {
                    hex = hex.replace('#', '');
                    const r = parseInt(hex.substring(0, 2), 16);
                    const g = parseInt(hex.substring(2, 4), 16);
                    const b = parseInt(hex.substring(4, 6), 16);
                    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                    return brightness > 128 ? 'black' : 'white';
                }

                const handleKeydown = (event) => {
                    if (event.code === 'Space') {
                        event.preventDefault();
                        refreshColors();
                    }
                };

                watch(colors, (newColors) => {
                    const hexString = newColors.map(c => c.hex.replace('#', '')).join('-');
                    window.history.replaceState(null, '', '#' + hexString);
                }, { deep: true });

                document.addEventListener('keydown', handleKeydown);

                return { colors, refreshColors, getTextColor };
            }
        }).mount('#app');
    </script>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #app {
            display: flex;
            height: 100%;
        }

        .color-box {
            height: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            text-align: center;
            background: transparent;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        button:not(#fresh) {
            margin-top: 8px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: transparent;
            color: inherit;
            display: flex;
            align-items: center;
            justify-self: center;
            transition: transform 0.2s;
        }

        button:not(#fresh):hover {
            transform: scale(1.2);
        }
    </style>
</body>

</html>
