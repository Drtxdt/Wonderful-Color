<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>

<body>
    <div id="app">
        <div v-for="(color, index) in colors" :key="index" :style="{ backgroundColor: color.hex }" class="color-box">
            <div class="content" :style="{ color: getTextColor(color.hex) }">
                <span class="hex">{{ color.hex.toUpperCase() }}</span>
                <button @click="color.isLocked = !color.isLocked">
                    <i class="material-icons">
                        {{ color.isLocked ? 'lock' : 'lock_open' }}
                    </i>
                </button>
            </div>
        </div>
        <button @click="refreshColors">Refresh Colors</button>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const colors = ref([
                    { hex: '#FF5733', isLocked: false },
                    { hex: '#33FF57', isLocked: false },
                    { hex: '#3357FF', isLocked: false },
                    { hex: '#F1C40F', isLocked: false },
                    { hex: '#8E44AD', isLocked: false }
                ])

                function getRandomHex() {
                    return '#' + Math.floor(Math.random() * 16777215).toString(16);
                }

                function refreshColors() {
                    for (let i = 0; i < colors.value.length; i++) {
                        if (!colors.value[i].isLocked) {
                            let before = colors.value[i].hex;
                            colors.value[i].hex = getRandomHex();
                            if (before == colors.value[i].hex) colors.value[i].hex = getRandomHex();
                        }
                    }
                }

                function getTextColor(hex) {
                    hex = hex.replace('#', '');
                    const r = parseInt(hex.substring(0, 2), 16);
                    const g = parseInt(hex.substring(2, 4), 16);    
                    const b = parseInt(hex.substring(4, 6), 16);
                    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
                    return brightness > 128 ? 'black' : 'white';
                }

                const handleKeydown = (event) => {
                    if (event.code === 'Space') {
                        event.preventDefault();
                        refreshColors();
                    }
                };

                window.addEventListener('keydown', handleKeydown);

                return { colors, refreshColors, getTextColor };
            }
        }).mount('#app');
    </script>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #app {
            display: flex;
            height: 100%;
        }

        .color-box {
            height: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        button {
            margin-top: 8px;
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</body>

</html>
