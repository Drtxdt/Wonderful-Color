<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <div v-for="color in colors" :key="color" :style="{ backgroundColor: color }" class="color-box"></div>
        <button @click="refreshColors">Refresh Colors</button>
    </div>

    <script>
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const colors = ref([
                    '#FF5733',
                    '#33FF57',
                    '#3357FF',
                    '#F1C40F',
                    '#8E44AD'
                ])

                generateColors = (num) => {
                    const colors = [];
                    for (let i = 0; i < num; i++) {
                        const color = '#' + Math.floor(Math.random() * 16777215).toString(16);
                        colors.push(color);
                    }
                    return colors;
                }

                function refreshColors() {
                    colors.value = generateColors(5);
                }

                const handleKeydown = (event) => {
                    if (event.key === ' ') {
                        event.preventDefault();
                        refreshColors();
                    }
                };

                window.addEventListener('keydown', handleKeydown);

                return { colors, refreshColors };
            }
        }).mount('#app');
    </script>

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        #app {
            display: flex;
            height: 100%;
        }

        .color-box {
            height: 100%;
            flex: 1;
        }
    </style>
</body>

</html>
